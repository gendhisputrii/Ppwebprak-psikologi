<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Konsultasi Baru - RuangPulih</title>

</head>

<style>
    /* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary: #6352c7;
    --primary-dark: #2d1f6e;
    --primary-light: #ede9fb;
    --text-dark: #1a1145;
    --text-muted: #8b88a8;
    --bg: #f6f5fc;
    --white: #ffffff;
    --border: #e7e4f5;
    --shadow: 0 8px 24px rgba(45, 31, 110, 0.06);
}

body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text-dark);
    min-height: 100vh;
}

/* MAIN */
.main {
    width: 100%;
    min-height: 100vh;
    padding: 20px;
}

/* TOPBAR */
.topbar {
    width: 100%;
    max-width: 800px;
    margin: 0 auto 20px;
    background: var(--white);
    border-radius: 14px;
    padding: 18px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow);
}

.topbar h3 {
    font-size: 24px;
    font-weight: 700;
}

/* AVATAR */
.user-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 15px;
}

/* CONTENT */
.content {
    width: 100%;
    max-width: 800px;
    margin: auto;
}

/* FORM CARD */
.form-card {
    background: var(--white);
    border-radius: 16px;
    padding: 28px;
    box-shadow: var(--shadow);
}

/* FORM */
.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dark);
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 13px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    background: #fafaff;
    outline: none;
    transition: 0.2s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    border-color: var(--primary);
    background: white;
}

textarea {
    resize: vertical;
    min-height: 110px;
}

/* BUTTON */
.form-actions {
    display: flex;
    gap: 12px;
    margin-top: 8px;
}

.btn-primary,
.btn-secondary {
    padding: 12px 22px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.btn-primary {
    background: var(--primary);
    color: white;
}

.btn-primary:hover {
    background: var(--primary-dark);
}

.btn-secondary {
    background: #eeeeee;
    color: #333;
}

.btn-secondary:hover {
    background: #dddddd;
}
</style>
<body>

<!-- MAIN -->
<main class="main">

<div class="topbar">
<h3>Konsultasi Baru</h3>
<div class="user-avatar">GV</div>
</div>

<div class="content">

<div class="form-card">

<form onsubmit="return submitForm()">

<div class="form-group">
<label>Pilih Psikolog</label>
<select required>
<option value="">-- Pilih Psikolog --</option>
<option>dr. Sarah Wijaya</option>
<option>dr. Andi Kusuma</option>
</select>
</div>

<div class="form-group">
<label>Tanggal</label>
<input type="date" required>
</div>

<div class="form-group">
<label>Waktu</label>
<input type="time" required>
</div>

<div class="form-group">
<label>Tipe Konsultasi</label>
<select required>
<option value="">-- Pilih Tipe --</option>
<option>Online</option>
<option>Offline</option>
</select>
</div>

<div class="form-group">
<label>Keluhan</label>
<textarea rows="4" placeholder="Ceritakan keluhan Anda..." required></textarea>
</div>

<div class="form-actions">
<button type="submit" class="btn-primary">Ajukan Konsultasi</button>
<button type="reset" class="btn-secondary">Batal</button>
</div>

</form>

</div>

</div>

</main>

<script>
function submitForm(){
    alert("Konsultasi berhasil diajukan!");
    return false;
}
</script>

</body>
</html>
