<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RuangPulih</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Selamat Datang </h2>
                <p>Silakan login ke akun Anda</p>
            </div>
            
            <form class="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Masukkan email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Masukkan password">
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="remember">
                    <label for="remember">Ingat saya</label>
                </div>
                <button type="submit" class="btn-login-submit">Login</button>
            </form>

            <div class="login-divider">atau login sebagai</div>
            
            <div class="login-role">
                <a href="dashboard-user.html" class="role-btn user">👤 Mahasiswa</a>
                <a href="dashboard-psikolog.html" class="role-btn psikolog">👨‍⚕️ Psikolog</a>
            </div>

            <p class="register-link">Belum punya akun? <a href="#">Daftar</a></p>
        </div>
    </div>
</body>
</html>
