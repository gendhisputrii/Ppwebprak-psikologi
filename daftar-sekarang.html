<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - RuangPulih</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #6352c7;
            --primary-dark: #2d1f6e;
            --bg: #f8f7ff;
            --text-dark: #1a1145;
            --text-muted: #8b88a8;
            --border: rgba(99,82,199,0.12);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .register-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-top: 5px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }

        .login-link {
            text-align: center;
            font-size: 13px;
            margin-top: 15px;
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .error-msg {
            font-size: 12px;
            color: red;
        }
    </style>
</head>

<body>

<div class="register-card">

    <h2>Daftar Akun ✨</h2>

    <form onsubmit="return registerUser(event)">

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="nama">
            <small class="error-msg" id="errNama"></small>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
            <small class="error-msg" id="errEmail"></small>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password">
            <small class="error-msg" id="errPass"></small>
        </div>

        <div class="form-group">
            <label>Konfirmasi Password</label>
            <input type="password" id="confirm">
            <small class="error-msg" id="errConfirm"></small>
        </div>

        <button type="submit" class="btn-submit">Daftar</button>

    </form>

    <p class="login-link">
        Sudah punya akun? <a href="login.html">Masuk</a>
    </p>

</div>

<script>
function registerUser(e){
    e.preventDefault();

    let nama = document.getElementById("nama").value;
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;

    let valid = true;

    document.getElementById("errNama").innerText="";
    document.getElementById("errEmail").innerText="";
    document.getElementById("errPass").innerText="";
    document.getElementById("errConfirm").innerText="";

    if(!nama){
        document.getElementById("errNama").innerText="Nama wajib diisi";
        valid=false;
    }

    if(!email || !email.includes("@")){
        document.getElementById("errEmail").innerText="Email tidak valid";
        valid=false;
    }

    if(pass.length < 6){
        document.getElementById("errPass").innerText="Minimal 6 karakter";
        valid=false;
    }

    if(pass !== confirm){
        document.getElementById("errConfirm").innerText="Password tidak sama";
        valid=false;
    }

    if(valid){
        alert("Registrasi berhasil!");
        window.location.href = "login.html";
    }

    return false;
}
</script>

</body>
</html>
