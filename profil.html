<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - RuangPulih</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary:       #6352c7;
            --primary-dark:  #2d1f6e;
            --primary-light: #ede9fb;
            --accent:        #4a90d9;
            --success:       #16a34a;
            --success-light: #f0fdf4;
            --warning:       #d97706;
            --warning-light: #fffbeb;
            --danger:        #dc2626;
            --danger-light:  #fef2f2;
            --text-dark:     #1a1145;
            --text-mid:      #4a4570;
            --text-muted:    #8b88a8;
            --bg:            #f8f7ff;
            --border:        rgba(99,82,199,0.12);
            --radius-sm:     8px;
            --radius-md:     14px;
            --radius-lg:     20px;
            --shadow-sm:     0 2px 8px rgba(45,31,110,0.06);
            --shadow-md:     0 8px 32px rgba(45,31,110,0.10);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: var(--primary-dark);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 50;
        }

        .sidebar-logo {
            padding: 24px 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .sidebar-logo span {
            font-size: 18px;
            font-weight: 800;
            color: white;
        }

        .sidebar-logo small {
            display: block;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .user-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: white;
        }

        .user-name { font-size: 13px; font-weight: 600; color: white; }
        .user-role { font-size: 11px; color: rgba(255,255,255,0.5); }

        .sidebar-nav { flex: 1; padding: 8px 12px; }

        .nav-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            padding: 12px 12px 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: rgba(255,255,255,0.65);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
        .nav-item.active { background: rgba(255,255,255,0.12); color: white; }
        .nav-icon { font-size: 16px; width: 20px; text-align: center; }

        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }

        .logout-btn:hover { color: #f87171; background: rgba(248,113,113,0.1); }

        /* MAIN */
        .main {
            margin-left: 240px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 64px;
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 40;
        }

        .topbar-title { font-size: 16px; font-weight: 700; color: var(--text-dark); }

        .topbar-right { display: flex; align-items: center; gap: 12px; }

        .notif-btn {
            width: 36px; height: 36px;
            border-radius: var(--radius-sm);
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px; position: relative;
        }

        .notif-dot {
            position: absolute; top: 6px; right: 6px;
            width: 7px; height: 7px;
            border-radius: 50%; background: #ef4444;
            border: 1.5px solid white;
        }

        .content { padding: 28px 32px; }

/* PROFILE */
.profile-container {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
}

.profile-card {
    background: white;
    border-radius: var(--radius-md);
    padding: 24px;
    width: 260px;
    text-align: center;
    border: 1px solid var(--border);
}

.profile-avatar {
    width: 80px;
    height: 80px;
    margin: 0 auto 12px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
}

.profile-role {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 12px;
}

.profile-info {
    flex: 1;
    background: white;
    border-radius: var(--radius-md);
    padding: 24px;
    border: 1px solid var(--border);
}

.profile-section {
    margin-bottom: 20px;
}

.profile-section h3 {
    margin-bottom: 10px;
}

.profile-row {
    margin-bottom: 14px;
}

.profile-row label {
    font-size: 13px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 4px;
}

.profile-row input,
textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
}

.profile-actions {
    display: flex;
    gap: 10px;
}

.btn-primary {
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
}

.btn-secondary {
    background: #ddd;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <span>RuangPulih</span>
            <small>Psikolog</small>
        </div>
        <div class="sidebar-user">
            <div class="user-avatar">DS</div>
            <div>
                <div class="user-name">Dr. Sarah Amelia</div>
                <div class="user-role">Psikolog Klinis</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-label">Menu Utama</div>
            <a href="dashboard-psikolog.html" class="nav-item">
                <span class="nav-icon">🏠</span> Dashboard
            </a>
            <a href="tabel-jadwal.html" class="nav-item">
                <span class="nav-icon">📅</span> Jadwal Konsultasi
            </a>
            <a href="daftar-pasien.html" class="nav-item">
                <span class="nav-icon">👥</span> Daftar Pasien
            </a>
            <a href="laporan-keuangan.html" class="nav-item">
                <span class="nav-icon">💰</span> Laporan Keuangan
            </a>
            <div class="nav-label">Akun</div>
            <a href="profil.html" class="nav-item active">
                <span class="nav-icon">👤</span> Profil
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="login.html" class="logout-btn">
                <span>🚪</span> Keluar
            </a>
        </div>
    </aside>

<!-- MAIN -->
<main class="main">

    <div class="topbar">
        Profil Saya
    </div>

    <div class="content">

        <div class="profile-container">

            <!-- FOTO -->
            <div class="profile-card">
                <div class="profile-avatar">👤</div>
                <h3>Andi Pratama</h3>
                <p class="profile-role">Klien</p>
                <button class="btn-primary">Ubah Foto</button>
            </div>

            <!-- DATA -->
            <div class="profile-info">

                <div class="profile-section">
                    <h3>Informasi Pribadi</h3>

                    <div class="profile-row">
                        <label>Nama Lengkap</label>
                        <input type="text" value="Andi Pratama">
                    </div>

                    <div class="profile-row">
                        <label>Email</label>
                        <input type="email" value="andi@email.com">
                    </div>

                    <div class="profile-row">
                        <label>Nomor Telepon</label>
                        <input type="text" value="081234567890">
                    </div>

                    <div class="profile-row">
                        <label>Tanggal Lahir</label>
                        <input type="date">
                    </div>
                </div>

                <div class="profile-section">
                    <h3>Bio</h3>
                    <textarea rows="4"></textarea>
                </div>

                <div class="profile-actions">
                    <button class="btn-primary">Simpan</button>
                    <button class="btn-secondary">Batal</button>
                </div>

            </div>

        </div>

    </div>

</main>

</body>
</html>
