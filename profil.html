<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - RuangPulih</title>
<link rel="stylesheet" href="style2.css">

</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <span>RuangPulih</span>
            <small>Psikolog</small>
        </div>
        <div class="sidebar-user">
            <div class="user-avatar">DS</div>
            <div>
                <div class="user-name">Dr. Sarah Amelia</div>
                <div class="user-role">Psikolog Klinis</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-label">Menu Utama</div>
            <a href="dashboard-psikolog.html" class="nav-item">
                <span class="nav-icon">🏠</span> Dashboard
            </a>
            <a href="tabel-jadwal.html" class="nav-item">
                <span class="nav-icon">📅</span> Jadwal Konsultasi
            </a>
            <a href="daftar-pasien.html" class="nav-item">
                <span class="nav-icon">👥</span> Daftar Pasien
            </a>
            <a href="laporan-keuangan.html" class="nav-item">
                <span class="nav-icon">💰</span> Laporan Keuangan
            </a>
            <div class="nav-label">Akun</div>
            <a href="profil.html" class="nav-item active">
                <span class="nav-icon">👤</span> Profil
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="login.html" class="logout-btn">
                <span>🚪</span> Keluar
            </a>
        </div>
    </aside>

<!-- MAIN -->
<main class="main">

    <div class="topbar">
        <h3>Profil Saya</h3>
        <div class="user-avatar">GV</div>
    </div>

    <div class="content">

        <div class="profile-container">

            <!-- FOTO -->
            <div class="profile-card">
                <div class="profile-avatar">👤</div>
                <h3>Dr. Sarah Amelia</h3>
                <p class="profile-role">Psikolog Klinis</p>
                <button class="btn-primary">Ubah Foto</button>
            </div>

            <!-- DATA -->
            <div class="profile-info">

                <div class="profile-section">
                    <h3>Informasi Pribadi</h3>

                    <div class="profile-row">
                        <label>Nama Lengkap</label>
                        <input type="text" value="Dr. Sarah Amelia">
                    </div>

                    <div class="profile-row">
                        <label>Email</label>
                        <input type="email" value="Sarahamelia@email.com">
                    </div>

                    <div class="profile-row">
                        <label>Nomor Telepon</label>
                        <input type="text" value="081234567890">
                    </div>

                    <div class="profile-row">
                        <label>Tanggal Lahir</label>
                        <input type="date">
                    </div>
                </div>

                <div class="profile-section">
                    <h3>Bio</h3>
                    <textarea rows="4" placeholder="Ceritakan tentang diri Anda..."></textarea>
                </div>

                <div class="profile-actions">
                    <button class="btn-primary">Simpan</button>
                    <button class="btn-secondary">Batal</button>
                </div>

            </div>

        </div>

    </div>

</main>

</body>
</html>
